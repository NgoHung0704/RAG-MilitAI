services:
  neo4j:
    image: neo4j:5.23.0-community
    container_name: militai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1024m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4jpassword} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: militai-app
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CHROMA_PERSIST_DIR: /app/data/chroma_db
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      DATA_PATH: /app/data/full_unified_annotations_patch.csv
      SAMPLE_DATA_PATH: /app/data/sample_of_data.csv
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

volumes:
  neo4j_data:
  neo4j_logs: