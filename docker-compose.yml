services:
  neo4j:
    image: neo4j:5.26.0  # replace with the tag from: docker images | grep neo4j
    container_name: militai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: militai-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
